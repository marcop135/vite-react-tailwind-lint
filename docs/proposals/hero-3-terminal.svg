<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="dotsLite" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#cbd5e1"/>
    </pattern>
  </defs>

  <!-- Light, sky-tinted background mirroring app's bg-sky-300 outer -->
  <rect width="1200" height="630" fill="#e0f2fe"/>
  <rect width="1200" height="630" fill="url(#dotsLite)"/>

  <!-- Wordmark -->
  <g>
    <text x="600" y="100" text-anchor="middle" font-size="86" font-weight="800" letter-spacing="-2" fill="#0f172a">vite-react-tailwind-lint</text>
    <line x1="220" y1="124" x2="980" y2="124" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    <text x="600" y="172" text-anchor="middle" font-size="30" font-weight="600" fill="#0f172a">React 19 + Tailwind 4 + Vite 7</text>
    <text x="600" y="206" text-anchor="middle" font-size="24" font-weight="500" fill="#475569">Linted, tested, light &amp; dark.</text>
  </g>

  <!-- Terminal window (centered vertically now that pills are gone) -->
  <g>
    <rect x="160" y="270" width="880" height="290" rx="14" fill="#0f172a"/>
    <rect x="160" y="270" width="880" height="40" rx="14" fill="#1e293b"/>
    <circle cx="186" cy="290" r="7" fill="#ef4444"/>
    <circle cx="210" cy="290" r="7" fill="#f59e0b"/>
    <circle cx="234" cy="290" r="7" fill="#22c55e"/>
    <text x="600" y="296" text-anchor="middle" font-size="16" fill="#94a3b8">~/code</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="500">
      <text x="186" y="356" fill="#22d3ee">$</text>
      <text x="216" y="356" fill="#f8fafc">npx degit marcop135/vite-react-tailwind-lint my-app</text>
      <text x="186" y="396" fill="#22d3ee">$</text>
      <text x="216" y="396" fill="#f8fafc">cd my-app &amp;&amp; npm install</text>
      <text x="186" y="436" fill="#22d3ee">$</text>
      <text x="216" y="436" fill="#f8fafc">npm run dev</text>
      <text x="186" y="488" fill="#94a3b8">VITE  ready in 248 ms</text>
      <text x="186" y="522" fill="#94a3b8">→  Local:  http://localhost:5173</text>
      <rect x="592" y="507" width="12" height="20" fill="#22d3ee"/>
    </g>
  </g>
</svg>
