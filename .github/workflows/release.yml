name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag (e.g. v1.2.3) to publish release notes for'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Existing tag (e.g. v1.2.3) to publish release notes for'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Release check (lint, test, build, audit)
        run: npm run release:check
        env:
          HUSKY: 0

      - name: Build concise release notes
        run: node scripts/release-notes-from-changelog.mjs "${{ steps.resolve.outputs.tag }}" release-body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: false
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.tag }}
          body_path: release-body.md
