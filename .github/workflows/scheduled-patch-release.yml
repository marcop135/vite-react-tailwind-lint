name: Scheduled patch release

on:
  schedule:
    - cron: '0 9 3,17 * *'
  workflow_dispatch:

concurrency:
  group: scheduled-patch-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout develop
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Release check (lint, test, build, audit)
        run: npm run release:check
        env:
          HUSKY: 0

      - name: Bump patch and changelog
        id: bump
        run: node scripts/bump-patch-maintenance.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Push release branch and open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --body "Automated patch release v${VERSION}.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Merge release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: gh pr merge --squash --delete-branch --admin "$PR_URL"

      - name: Tag merged commit on develop
        id: tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin develop
          git checkout develop
          git reset --hard origin/develop
          git tag -a "v${VERSION}" -m "${VERSION}"
          git push origin "refs/tags/v${VERSION}"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  publish:
    needs: release
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      tag: ${{ needs.release.outputs.tag }}
